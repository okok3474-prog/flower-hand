<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Gesture Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #mainVideo { width: 100vw; height: 100vh; object-fit: cover; display: block; }

        /* 텍스트 레이아웃: 그림자 제거 버전 */
        #status {
            position: absolute;
            left: 30px;
            top: 25px;
            display: flex;
            align-items: baseline;
            gap: 15px;
            z-index: 20;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            color: #ffffff;
            pointer-events: none;
            /* 그림자 효과(text-shadow) 삭제 */
        }

        .guide-text {
            font-size: 14px;
            font-weight: 500; /* Medium: 시인성을 위해 500 유지 */
            letter-spacing: -0.02em;
            opacity: 1; /* 그림자가 없으므로 투명도를 빼고 선명하게 표시 */
        }

        .percent-text {
            font-size: 16px;
            font-weight: 400; /* Regular: 요청하신 대로 숫자 두께 유지 */
            min-width: 40px;
        }

        /* 웹캠 PIP */
        #pipContainer {
            position: absolute; 
            right: 30px; 
            bottom: 30px; 
            width: 200px; 
            height: 150px;
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 4px;
            transform: scaleX(-1); 
            z-index: 10;
        }
        #webcam, #outputCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <video id="mainVideo" playsinline preload="auto">
        <source src="flower_timelapse.mp4" type="video/mp4">
    </video>

    <div id="status">
        <span class="guide-text">카메라를 향해 주먹을 쥐었다 펴면 꽃이 피어납니다</span>
        <span class="percent-text" id="percentDisplay">0%</span>
    </div>

    <div id="pipContainer">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="outputCanvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('mainVideo');
        const webcamElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('outputCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const percentDisplay = document.getElementById('percentDisplay');

        const MIN_RATIO = 1.0;
        const MAX_RATIO = 2.2;
        let targetProgress = 0;
        let currentProgress = 0;
        const LERP_FACTOR = 0.12;

        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // PIP 드로잉: 선명한 흰색 선과 관절 포인트
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
                    color: 'rgba(255, 255, 255, 1.0)',
                    lineWidth: 1.5
                });
                drawLandmarks(canvasCtx, landmarks, {
                    color: 'rgba(255, 255, 255, 0.7)',
                    lineWidth: 1, 
                    radius: 2
                });

                const wrist = landmarks[0];
                const middleMcp = landmarks[9];
                const tips = [landmarks[8], landmarks[12], landmarks[16], landmarks[20]];

                const palmSize = getDistance(wrist, middleMcp);
                const totalTipDist = tips.reduce((sum, tip) => sum + getDistance(wrist, tip), 0);
                const avgTipDist = totalTipDist / 4;

                const currentRatio = avgTipDist / palmSize;
                let normalized = (currentRatio - MIN_RATIO) / (MAX_RATIO - MIN_RATIO);
                normalized = Math.max(0, Math.min(1, normalized));

                targetProgress = normalized;
                percentDisplay.innerText = `${(normalized * 100).toFixed(0)}%`;
            }
            canvasCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(onResults);

        const camera = new Camera(webcamElement, {
            onFrame: async () => { await hands.send({image: webcamElement}); },
            width: 640, height: 480
        });
        camera.start();

        function updateVideo() {
            if (videoElement.readyState >= 2 && videoElement.duration) {
                currentProgress += (targetProgress - currentProgress) * LERP_FACTOR;
                videoElement.currentTime = currentProgress * videoElement.duration;
            }
            requestAnimationFrame(updateVideo);
        }

        window.onload = () => {
            canvasElement.width = 640;
            canvasElement.height = 480;
            updateVideo();
        };
    </script>
</body>
</html>
